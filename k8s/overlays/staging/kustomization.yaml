apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: karasu-erp-staging

resources:
  - ../../base/namespace.yaml
  - ../../base/configmap.yaml
  - ../../base/secrets.yaml
  - ../../base/api-deployment.yaml
  - ../../base/ingress.yaml

patches:
  - target:
      kind: ConfigMap
      name: karasu-api-config
    patch: |-
      - op: replace
        path: /data/ASPNETCORE_ENVIRONMENT
        value: Staging

replicas:
  - name: karasu-api
    count: 2

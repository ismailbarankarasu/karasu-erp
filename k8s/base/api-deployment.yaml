apiVersion: apps/v1
kind: Deployment
metadata:
  name: karasu-api
  namespace: karasu-erp
  labels:
    app: karasu-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: karasu-api
  template:
    metadata:
      labels:
        app: karasu-api
    spec:
      containers:
        - name: api
          image: ghcr.io/karasu/erp-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: karasu-api-config
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: karasu-secrets
                  key: db-connection
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: karasu-secrets
                  key: redis-connection
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: karasu-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: karasu-api
  namespace: karasu-erp
spec:
  selector:
    app: karasu-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: karasu-api-hpa
  namespace: karasu-erp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: karasu-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: karasu-api-ingress
  namespace: karasu-erp
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.karasuerp.com
      secretName: karasu-tls
  rules:
    - host: api.karasuerp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: karasu-api
                port:
                  number: 80
